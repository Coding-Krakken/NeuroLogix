version: 2
updates:
  - package-ecosystem: npm
    directory: "/.github/framework"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: increase
    reviewers:
      - "<ORGANIZATION_NAME>"
    assignees:
      - "<ORGANIZATION_NAME>"
    labels:
      - "dependencies"
      - "framework"
      - "manual-approval-required"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    reviewers:
      - "<ORGANIZATION_NAME>"
    labels:
      - "dependencies"
      - "github-actions"

# Rollback expectation for framework update failures:
# revert the dependency update PR and include the linked issue URL documenting rollback rationale.

