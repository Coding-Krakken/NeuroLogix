version: 2
updates:
  # ─────────────────────────────────────
  # npm ecosystem — root workspace
  # ─────────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      security-patches:
        applies-to: security-updates
        update-types:
          - patch
          - minor
      patch-updates:
        applies-to: version-updates
        update-types:
          - patch
      minor-updates:
        applies-to: version-updates
        update-types:
          - minor
    ignore:
      # Major version bumps require manual review per DEP-GOV-001
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: "fix(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope

  # ─────────────────────────────────────
  # GitHub Actions
  # ─────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
      include: scope
