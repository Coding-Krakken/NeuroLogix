# WIP Limits and Sequencing Rules

wip_limits:
  max_active_prs: 3
  max_active_branches: 5
  rule: "Complete or close before opening new PRs beyond WIP limit"
  exception: "Hotfixes bypass WIP limit"

sequencing_rules:
  - "Model-first: no delivery code before models are merged"
  - "CI pipeline must exist before benchmarks are meaningful"
  - "Phase N must be >80% complete before Phase N+1 delivery starts"
  - "Security hardening (Phase 7) gates all production deployments"
  - "SBOM required before any container is published"

# Reprioritization Triggers

reprioritization_triggers:
  immediate:
    - "Critical vulnerability (CVSS >= 9.0) discovered"
    - "Safety interlock bypass event detected"
    - "Audit log integrity violation"
    - "Production availability SLO breach"
  scheduled_quarterly:
    - "Stakeholder priority review"
    - "Competitor feature parity gap identified"
    - "Regulatory deadline approaching"
  on_delivery:
    - "Phase completes — re-score newly unblocked items"
    - "Major dependency update changes ecosystem assumptions"

reprioritization_process:
  trigger_detection: on_event_or_quarterly
  scoring_refresh: all_unstarted_backlog_items
  output: "updated prioritized_queue in this file"
  approval: tech_lead
  communication: "GitHub discussion or issue comment"
