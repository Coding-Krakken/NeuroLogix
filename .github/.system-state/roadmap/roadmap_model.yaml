# Roadmap and Prioritization Model

# Scoring Dimensions and Weights

scoring_dimensions:
  business_impact:
    weight: 0.30
    scale: 1-5
    criteria:
      5: "Critical path to production; blocks revenue or safety compliance"
      4: "Enables key product capability or removes major blocker"
      3: "Meaningful improvement to performance, reliability, or UX"
      2: "Nice-to-have improvement with limited immediate impact"
      1: "Housekeeping or minor refactor with no user-facing impact"

  risk_reduction:
    weight: 0.25
    scale: 1-5
    criteria:
      5: "Eliminates safety-critical or compliance risk"
      4: "Eliminates high severity security or reliability risk"
      3: "Reduces moderate risk with documented mitigation"
      2: "Low risk reduction; existing controls adequate"
      1: "No meaningful risk reduction"

  dependency_unlock:
    weight: 0.20
    scale: 1-5
    criteria:
      5: "Unlocks 3+ blocked issues or a full delivery phase"
      4: "Unlocks 2 blocked issues"
      3: "Unlocks 1 issue or enables parallel work"
      2: "Minor dependency; can be worked around"
      1: "No blocking dependencies"

  effort:
    weight: 0.15
    scale: 1-5
    note: "Inverse: lower effort = higher score"
    criteria:
      5: "< 1 day (simple config, small model file)"
      4: "1-3 days (bounded slice, clear scope)"
      3: "3-7 days (moderate scope, some unknowns)"
      2: "1-2 weeks (complex integration or multi-service change)"
      1: "> 2 weeks (large scope or high uncertainty)"

  compliance_urgency:
    weight: 0.10
    scale: 1-5
    criteria:
      5: "Required for IEC 62443 / ISO 27001 / NIST CSF compliance gate"
      4: "Required for audit readiness or regulatory obligation"
      3: "Improves compliance posture without hard deadline"
      2: "Documentation/governance improvement"
      1: "No compliance relevance"

scoring_formula: "SUM(dimension_score * dimension_weight)"

