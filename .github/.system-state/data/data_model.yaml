data_model:
  id: neurologix-data-model
  version: 1.0.0
  phase: 4
  status: proposed
  last_updated: 2026-03-10
  source_issue: 20
  objective: Canonical data model for implemented and planned domains with explicit constraints and governance boundaries.
  companion_artifacts:
    - id: contracts-model-reference
      type: contracts-model
      path: .github/.system-state/contracts/contracts_model.yaml
      purpose: Align data entities and event/schema coverage with contract inventory.

field_constraints:
  global_required_keys:
    - tenant_id
    - entity_id
    - created_at
    - updated_at
  data_types:
    tenant_id:
      type: string
      pattern: ^[a-z0-9][a-z0-9-]{1,62}$
      nullable: false
    site_id:
      type: string
      pattern: ^[a-z0-9][a-z0-9-_]{1,62}$
      nullable: false
    correlation_id:
      type: string
      pattern: ^[a-f0-9-]{16,64}$
      nullable: false
    timestamp:
      type: string
      format: date-time
      nullable: false
    version:
      type: integer
      minimum: 1
      nullable: false

canonical_entities:
  implemented:
    capability_definition:
      owner: services/capability-registry
      primary_key: capability_id
      required_fields:
        - capability_id
        - tenant_id
        - capability_type
        - status
        - version
      constraints:
        capability_id:
          type: string
          pattern: ^cap\.[a-z0-9._-]{3,120}$
        status:
          enum:
            - active
            - deprecated
            - disabled
    policy_definition:
      owner: services/policy-engine
      primary_key: policy_id
      required_fields:
        - policy_id
        - tenant_id
        - policy_version
        - rule_set
        - enforcement_mode
      constraints:
        enforcement_mode:
          enum:
            - strict
            - advisory
    recipe_execution:
      owner: services/recipe-executor
      primary_key: execution_id
      required_fields:
        - execution_id
        - tenant_id
        - recipe_id
        - status
        - started_at
      constraints:
        status:
          enum:
            - queued
            - running
            - succeeded
            - failed
            - cancelled
    twin_state_snapshot:
      owner: services/digital-twin
      primary_key: twin_id
      required_fields:
        - twin_id
        - tenant_id
        - state_version
        - state_payload
        - observed_at
      constraints:
        state_version:
          type: integer
          minimum: 1

  planned:
    dispatch_job:
      owner: planned/dispatch
      primary_key: dispatch_job_id
      required_fields:
        - dispatch_job_id
        - tenant_id
        - priority
        - state
      constraints:
        priority:
          enum:
            - low
            - normal
            - high
            - urgent
    connector_session:
      owner: planned/wms-wcs-connectors
      primary_key: connector_session_id
      required_fields:
        - connector_session_id
        - tenant_id
        - connector_type
        - protocol
      constraints:
        connector_type:
          enum:
            - wms
            - wcs
    asr_transcript:
      owner: planned/asr
      primary_key: transcript_id
      required_fields:
        - transcript_id
        - tenant_id
        - language
        - confidence
      constraints:
        confidence:
          type: number
          minimum: 0
          maximum: 1
    cv_detection_result:
      owner: planned/cv
      primary_key: detection_id
      required_fields:
        - detection_id
        - tenant_id
        - model_id
        - confidence
      constraints:
        confidence:
          type: number
          minimum: 0
          maximum: 1
    edge_adapter_message:
      owner: planned/edge-adapters
      primary_key: message_id
      required_fields:
        - message_id
        - tenant_id
        - adapter_id
        - direction
      constraints:
        direction:
          enum:
            - inbound
            - outbound

schema_domains:
  implemented:
    capability-registry:
      entity_refs:
        - capability_definition
      telemetry_events:
        - capability.indexed
      schema_refs:
        - .github/.system-state/contracts/api.yaml#/components/schemas/CapabilityRegistryService
        - .github/.system-state/contracts/api.yaml#/components/schemas/CapabilityIndexedEvent
    policy-engine:
      entity_refs:
        - policy_definition
      telemetry_events:
        - policy.evaluated
      schema_refs:
        - .github/.system-state/contracts/api.yaml#/components/schemas/PolicyEngineService
        - .github/.system-state/contracts/api.yaml#/components/schemas/PolicyEvaluatedEvent
    recipe-executor:
      entity_refs:
        - recipe_execution
      telemetry_events:
        - recipe.execution.status
      schema_refs:
        - .github/.system-state/contracts/api.yaml#/components/schemas/RecipeExecutorService
        - .github/.system-state/contracts/api.yaml#/components/schemas/RecipeExecutionStatusEvent
    digital-twin:
      entity_refs:
        - twin_state_snapshot
      telemetry_events:
        - twin.state.updated
      schema_refs:
        - .github/.system-state/contracts/api.yaml#/components/schemas/DigitalTwinService
        - .github/.system-state/contracts/api.yaml#/components/schemas/DigitalTwinStateUpdatedEvent

  planned:
    dispatch:
      entity_refs:
        - dispatch_job
      telemetry_events:
        - dispatch.job.dispatched
      schema_refs:
        - .github/.system-state/contracts/contracts_model.yaml#planned_contracts/dispatch
    wms-wcs-connectors:
      entity_refs:
        - connector_session
      telemetry_events:
        - connector.lifecycle.changed
      schema_refs:
        - .github/.system-state/contracts/contracts_model.yaml#planned_contracts/wms-wcs-connectors
    asr:
      entity_refs:
        - asr_transcript
      telemetry_events:
        - asr.transcript.ready
      schema_refs:
        - .github/.system-state/contracts/contracts_model.yaml#planned_contracts/asr
    cv:
      entity_refs:
        - cv_detection_result
      telemetry_events:
        - cv.detection.published
      schema_refs:
        - .github/.system-state/contracts/contracts_model.yaml#planned_contracts/cv
    edge-adapters:
      entity_refs:
        - edge_adapter_message
      telemetry_events:
        - edge.adapter.telemetry
      schema_refs:
        - .github/.system-state/contracts/contracts_model.yaml#planned_contracts/edge-adapters

tenancy_partitioning:
  required_partition_keys:
    - tenant_id
  optional_partition_keys:
    - site_id
    - zone_id
    - device_id
  entity_partition_rules:
    capability_definition:
      partition_key: tenant_id
      secondary_keys:
        - site_id
    policy_definition:
      partition_key: tenant_id
    recipe_execution:
      partition_key: tenant_id
      secondary_keys:
        - site_id
    twin_state_snapshot:
      partition_key: tenant_id
      secondary_keys:
        - site_id
        - device_id
    dispatch_job:
      partition_key: tenant_id
      secondary_keys:
        - site_id
    connector_session:
      partition_key: tenant_id
    asr_transcript:
      partition_key: tenant_id
    cv_detection_result:
      partition_key: tenant_id
    edge_adapter_message:
      partition_key: tenant_id
      secondary_keys:
        - device_id

retention_classes:
  classes:
    operational_hot:
      ttl_days: 30
      usage: high-frequency runtime operations and near-real-time troubleshooting
    analytical_warm:
      ttl_days: 365
      usage: analytics, trend analysis, and model tuning
    compliance_cold:
      ttl_days: 2555
      usage: audit, regulatory, and legal retention obligations
  entity_class_mapping:
    capability_definition: analytical_warm
    policy_definition: analytical_warm
    recipe_execution: operational_hot
    twin_state_snapshot: operational_hot
    dispatch_job: operational_hot
    connector_session: operational_hot
    asr_transcript: compliance_cold
    cv_detection_result: analytical_warm
    edge_adapter_message: analytical_warm

validation_boundaries:
  ownership:
    schema_authority: planner-architect
    implementation_authority: builder
    merge_authority: validator-merger
  required_structural_checks:
    - yaml_parse_success
    - top_level_sections_present
    - implemented_and_planned_schema_domain_coverage_present
    - retention_class_mapping_present
    - tenancy_partitioning_rules_present
  acceptance_mapping:
    ac1_machine_readable_model: data_model.yaml parses as YAML and has deterministic top-level sections.
    ac2_domain_coverage: implemented and planned schema domains both present with entity and schema references.
    ac3_partitioning_and_retention: tenancy_partitioning and retention_classes sections are explicit and testable.
    ac4_validation_evidence: planning evidence includes reproducible structural validation commands and outputs.
    ac5_scope_bounded: no runtime service or package code changes in this slice.