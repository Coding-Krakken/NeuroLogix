delivery_model:
  id: neurologix-delivery-lifecycle-model
  version: 1.0.0
  phase: 2
  status: proposed
  last_updated: 2026-03-10
  source_issue: 18
  objective: Deterministic delivery lifecycle from intake through deploy and rollback.
  model_first_gate:
    implementation_requires_accepted_model: true
    required_review_roles:
      - planner-architect
      - validator-merger

roles:
  planner-architect:
    accountable_for_states:
      - intake
      - planning
      - blocked
    responsibilities:
      - issue_selection_and_scope
      - implementation_brief_handoff
      - remediation_replan
  builder:
    accountable_for_states:
      - implementation
      - rollback_initiated
    responsibilities:
      - bounded_implementation
      - tests_and_validation_evidence
      - rollback_execution_when_required
  validator-merger:
    accountable_for_states:
      - validation
      - ready_for_deploy
      - deployed
      - rolled_back
      - closed
    responsibilities:
      - acceptance_verification
      - policy_and_quality_gate_confirmation
      - merge_or_revert_decision

segregation_of_duties:
  - id: sod-01
    applies_to_transition: validation_to_ready_for_deploy
    rule: validator-merger actor MUST NOT equal builder actor for the same work item.
  - id: sod-02
    applies_to_transition: ready_for_deploy_to_deployed
    rule: merge actor MUST be validator-merger and MUST NOT be the planner-architect actor.
  - id: sod-03
    applies_to_transition: blocked_to_planning
    rule: blocked-state remediation acceptance MUST be confirmed by planner-architect before builder retries.

lifecycle:
  states:
    - id: intake
      accountable_role: planner-architect
      entry_criteria:
        - issue_exists_and_is_open
        - dependencies_recorded
      exit_criteria:
        - deterministic_eligibility_gates_pass
        - issue_selected_for_execution
    - id: planning
      accountable_role: planner-architect
      entry_criteria:
        - selected_issue_has_bounded_scope
      exit_criteria:
        - handoff_to_builder_created
        - in_scope_and_out_of_scope_defined
    - id: implementation
      accountable_role: builder
      entry_criteria:
        - builder_handoff_received
        - model_first_gate_confirmed
      exit_criteria:
        - implementation_slice_complete
        - tests_for_changed_behavior_updated
        - builder_validation_evidence_created
    - id: validation
      accountable_role: validator-merger
      entry_criteria:
        - pull_request_opened_or_updated
        - builder_validation_evidence_available
      exit_criteria:
        - acceptance_criteria_verified
        - required_checks_green
    - id: ready_for_deploy
      accountable_role: validator-merger
      entry_criteria:
        - validation_completed_without_blockers
      exit_criteria:
        - merge_plan_and_rollback_notes_recorded
    - id: deployed
      accountable_role: validator-merger
      entry_criteria:
        - protected_branch_merge_completed
      exit_criteria:
        - post_merge_validation_passed
    - id: rollback_initiated
      accountable_role: builder
      entry_criteria:
        - deployment_regression_or_policy_violation_detected
        - rollback_authorized_by_validator-merger
      exit_criteria:
        - rollback_actions_executed_and_logged
    - id: rolled_back
      accountable_role: validator-merger
      entry_criteria:
        - rollback_execution_evidence_available
      exit_criteria:
        - system_restored_to_last_known_good
        - follow_up_issue_opened_for_remediation
    - id: blocked
      accountable_role: planner-architect
      entry_criteria:
        - retry_budget_exhausted_or_external_dependency_block
      exit_criteria:
        - escalation_completed
        - remediation_plan_approved
    - id: closed
      accountable_role: validator-merger
      entry_criteria:
        - deployed_or_rolled_back_state_reached
      exit_criteria:
        - issue_closure_traceability_complete

  transitions:
    - id: intake_to_planning
      from: intake
      to: planning
      trigger: issue_selected_and_eligible
      entry_criteria:
        - weighted_scoring_recorded
      exit_criteria:
        - issue_selection_record_committed
      required_evidence_artifacts:
        - planning/issue-selection-issue-<id>.md
        - planning/eligibility-snapshot-<date>.json
    - id: planning_to_implementation
      from: planning
      to: implementation
      trigger: builder_handoff_dispatched
      entry_criteria:
        - planning_handoff_complete
      exit_criteria:
        - builder_receipt_confirmed
      required_evidence_artifacts:
        - planning/handoff-to-builder-issue-<id>.md
        - .github/templates/implementation-plan.md
        - .github/.system-state/delivery/delivery_model.yaml
    - id: implementation_to_validation
      from: implementation
      to: validation
      trigger: pull_request_prepared
      entry_criteria:
        - acceptance_criteria_implemented
      exit_criteria:
        - validator_handoff_dispatched
      required_evidence_artifacts:
        - planning/validation-evidence-issue-<id>.md
        - tests_or_validation_command_outputs
        - updated_docs_or_adr_links_when_scope_requires
    - id: validation_to_ready_for_deploy
      from: validation
      to: ready_for_deploy
      trigger: validator_approves_merge
      entry_criteria:
        - segregation_of_duties_checks_pass
      exit_criteria:
        - merge_readiness_recorded
      required_evidence_artifacts:
        - .github/templates/pr-summary.md
        - .github/templates/review-summary.md
        - planning/handoff-to-validator-issue-<id>.md
    - id: ready_for_deploy_to_deployed
      from: ready_for_deploy
      to: deployed
      trigger: pull_request_merged
      entry_criteria:
        - required_checks_status_success
      exit_criteria:
        - merge_commit_recorded
      required_evidence_artifacts:
        - planning/merge-record-issue-<id>.md
        - rollout_or_release_notes_if_applicable
    - id: deployed_to_closed
      from: deployed
      to: closed
      trigger: post_merge_validation_complete
      entry_criteria:
        - main_branch_validation_executed
      exit_criteria:
        - closure_record_published
      required_evidence_artifacts:
        - planning/closure-record-issue-<id>.md
        - post_merge_validation_output
    - id: deployed_to_rollback_initiated
      from: deployed
      to: rollback_initiated
      trigger: critical_regression_detected
      entry_criteria:
        - incident_severity_assessed
      exit_criteria:
        - rollback_steps_started
      required_evidence_artifacts:
        - rollback_trigger_record
        - impacted_scope_assessment
        - runbook_reference
    - id: rollback_initiated_to_rolled_back
      from: rollback_initiated
      to: rolled_back
      trigger: rollback_execution_complete
      entry_criteria:
        - rollback_commands_verified
      exit_criteria:
        - regression_no_longer_present
      required_evidence_artifacts:
        - rollback_execution_log
        - validation_after_rollback
    - id: any_active_to_blocked
      from: intake|planning|implementation|validation|ready_for_deploy|deployed|rollback_initiated
      to: blocked
      trigger: retry_budget_exhausted_or_external_block
      entry_criteria:
        - retries_for_current_transition_exceed_budget
      exit_criteria:
        - blocker_ticket_or_dependency_resolution_recorded
      required_evidence_artifacts:
        - blocked_reason_record
        - retry_attempt_log
    - id: blocked_to_planning
      from: blocked
      to: planning
      trigger: remediation_plan_approved
      entry_criteria:
        - escalation_path_completed
      exit_criteria:
        - revised_handoff_created
      required_evidence_artifacts:
        - remediation_plan
        - updated_handoff_document

evidence_requirements_by_state:
  intake:
    required_artifacts:
      - issue
      - dependency_snapshot
  planning:
    required_artifacts:
      - issue_selection_record
      - implementation_plan
      - builder_handoff
  implementation:
    required_artifacts:
      - model_updates_or_code_changes
      - test_updates
      - validation_evidence
  validation:
    required_artifacts:
      - pr_summary
      - review_summary
      - required_check_results
  ready_for_deploy:
    required_artifacts:
      - merge_plan
      - rollback_notes
  deployed:
    required_artifacts:
      - merge_record
      - post_merge_validation
  rollback_initiated:
    required_artifacts:
      - rollback_runbook
      - execution_log
  rolled_back:
    required_artifacts:
      - rollback_validation
      - follow_up_issue
  blocked:
    required_artifacts:
      - blocker_record
      - remediation_plan
  closed:
    required_artifacts:
      - closure_record

sla:
  handoff:
    acknowledgement_minutes: 30
    first_status_update_minutes: 120
  blocked_state:
    acknowledgement_minutes: 15
    remediation_plan_minutes: 60
    max_blocked_duration_hours: 24
  validation:
    evidence_review_start_minutes: 60
    decision_after_checks_hours: 8

escalation:
  retry_budget:
    max_attempts_per_transition: 2
    backoff_minutes:
      - 15
      - 30
    budget_exhaustion_condition: attempt_count > max_attempts_per_transition
  deterministic_path:
    - order: 1
      condition: retry_budget_exhausted
      escalate_to_role: planner-architect
      required_action: classify_blocker_and_assign_owner
      action_due_minutes: 30
    - order: 2
      condition: blocker_not_resolved_within_sla
      escalate_to_role: validator-merger
      required_action: decide_retry_or_rollback_or_scope_split
      action_due_minutes: 60
    - order: 3
      condition: unresolved_after_validator_decision_window
      escalate_to_role: incident-commander
      required_action: open_incident_and_execute_runbook
      action_due_minutes: 120
