schema_version: "1.0"
model_id: PERF-BUDGETS-001
issue: "https://github.com/Coding-Krakken/NeuroLogix/issues/45"
last_updated: "2026-03-10"
status: active
phase: "7-9"

# Core Service API Latency Budgets

latency_budgets:
  control_loop:
    description: "End-to-end tag ingest to PLC command delivery"
    p50_ms: 20
    p95_ms: 50
    p99_ms: 100
    gate_action:
      warn_above_ms: 50
      block_above_ms: 150
    measurement: histogram_quantile over rolling_1h

  policy_decision:
    description: "OPA policy evaluation latency (single rule set)"
    p50_ms: 5
    p95_ms: 10
    p99_ms: 25
    gate_action:
      warn_above_ms: 10
      block_above_ms: 50
    measurement: histogram_quantile over rolling_1h

  recipe_execution_start:
    description: "Time from recipe execute request to first step dispatch"
    p50_ms: 30
    p95_ms: 100
    p99_ms: 200
    gate_action:
      warn_above_ms: 100
      block_above_ms: 500
    measurement: histogram_quantile over rolling_1h

  capability_lookup:
    description: "Capability registry read latency"
    p50_ms: 5
    p95_ms: 20
    p99_ms: 50
    gate_action:
      warn_above_ms: 20
      block_above_ms: 100
    measurement: histogram_quantile over rolling_1h

  digital_twin_sync:
    description: "Physical tag to digital twin state convergence lag"
    p50_ms: 50
    p95_ms: 150
    p99_ms: 200
    gate_action:
      warn_above_ms: 200
      block_above_ms: 500
    measurement: gauge over rolling_1m

  audit_write:
    description: "Audit log entry write latency"
    p50_ms: 10
    p95_ms: 30
    p99_ms: 50
    gate_action:
      warn_above_ms: 50
      block_above_ms: 100
    measurement: histogram_quantile over rolling_1h
    note: "100% write success required; latency budget is secondary to durability"

# Throughput Budgets

throughput_budgets:
  tag_ingestion:
    description: "Tag values processed per second system-wide"
    sustained_min_per_second: 10000
    burst_max_per_second: 15000
    measurement_window: rolling_1m
    gate_action:
      warn_below: 8000
      block_below: 5000

  policy_evaluations:
    description: "Policy evaluations per second (OPA)"
    sustained_min_per_second: 1000
    measurement_window: rolling_1m
    gate_action:
      warn_below: 800
      block_below: 500

  recipe_executions:
    description: "Concurrent recipe executions"
    max_concurrent: 50
    measurement: gauge
    gate_action:
      warn_above: 40
      block_above: 50

  audit_events:
    description: "Audit events written per second"
    sustained_min_per_second: 500
    measurement_window: rolling_1m
    gate_action:
      warn_below: 400
      block_below: 200

# UI Performance Budgets — Mission Control

ui_budgets:
  lcp:
    description: "Largest Contentful Paint"
    target_ms: 1200
    warn_above_ms: 1500
    block_above_ms: 2500
    measurement: Lighthouse_CI + RUM_p75

  inp:
    description: "Interaction to Next Paint (replaces FID)"
    target_ms: 200
    warn_above_ms: 300
    block_above_ms: 500
    measurement: Lighthouse_CI + RUM_p75

  fid:
    description: "First Input Delay (legacy; superseded by INP)"
    target_ms: 10
    warn_above_ms: 50
    block_above_ms: 100
    measurement: Lighthouse_CI

  cls:
    description: "Cumulative Layout Shift"
    target: 0.05
    warn_above: 0.1
    block_above: 0.25
    measurement: Lighthouse_CI + RUM_p75

  ttfb:
    description: "Time to First Byte"
    target_ms: 200
    warn_above_ms: 500
    block_above_ms: 800
    measurement: Lighthouse_CI

  bundle_size:
    description: "Total JS bundle size (first load)"
    target_kb: 200
    warn_above_kb: 300
    block_above_kb: 500
    measurement: webpack_bundle_analyzer or next_build_output

lighthouse_scores:
  performance:
    target: 90
    warn_below: 85
    block_below: 75
  accessibility:
    target: 95
    warn_below: 90
    block_below: 80
  best_practices:
    target: 90
    warn_below: 85
    block_below: 75
  seo:
    target: 80
    warn_below: 70
    block_below: null
    note: "Not gated for industrial internal tooling"

# Benchmark Scenario Matrix

benchmarks:
  control_loop_sustained:
    scenario: "10,000 tag/s ingestion for 60 seconds while running 10 recipes"
    success_criteria:
      - control_loop_p95_ms: <= 50
      - control_loop_p99_ms: <= 100
      - error_rate_pct: <= 0.1
      - audit_write_success_pct: 100
    environment: staging
    trigger: pre_release_gate

  policy_engine_burst:
    scenario: "5,000 concurrent policy evaluations"
    success_criteria:
      - policy_decision_p95_ms: <= 10
      - policy_decision_p99_ms: <= 25
      - error_rate_pct: <= 0.1
    environment: staging
    trigger: pre_release_gate

  recipe_executor_parallel:
    scenario: "50 concurrent recipe executions including safety checks"
    success_criteria:
      - recipe_execution_start_p95_ms: <= 100
      - no_safety_interlock_bypasses: true
      - audit_emit_on_all_steps: true
    environment: staging
    trigger: pre_release_gate

  mission_control_under_load:
    scenario: "50 concurrent SSE clients receiving 1,000 tag updates/s"
    success_criteria:
      - sse_stream_lag_p95_ms: <= 500
      - sse_reconnect_max_ms: <= 5000
      - no_dropped_critical_alarms: true
    environment: staging
    trigger: pre_release_gate

  digital_twin_convergence:
    scenario: "10,000 tag updates with simultaneous digital twin read queries"
    success_criteria:
      - sync_lag_p95_ms: <= 200
      - twin_state_accuracy_pct: 100
    environment: staging
    trigger: pre_release_gate

# CI Gate Integration

ci_gates:
  pr_merge:
    required_checks:
      - lint: pass
      - typecheck: pass
      - unit_tests: pass_with_coverage
      - build: pass
    optional_checks:
      - integration_tests: warn_on_fail
      - lighthouse_ci: warn_below_target
    enforcement: block_on_required_fail

  pre_release:
    required_checks:
      - all_pr_merge_checks: pass
      - benchmark_control_loop_sustained: pass
      - benchmark_policy_engine_burst: pass
      - benchmark_recipe_executor_parallel: pass
      - lighthouse_scores: above_target
      - e2e_critical_journeys: pass
    enforcement: block_release

  canary_rollout:
    canary_10pct:
      monitoring_hours: 24
      rollback_triggers:
        - control_loop_p99_above_ms: 200
        - error_rate_above_pct: 0.5
        - recipe_failure_rate_above_pct: 0.1
        - safety_interlock_bypass: any
        - audit_write_failure: any
    canary_25pct:
      monitoring_hours: 48
      rollback_triggers: same_as_10pct
    canary_50pct:
      monitoring_hours: 72
      rollback_triggers: same_as_10pct
    full_100pct:
      monitoring_hours: 168
      rollback_triggers: same_as_10pct

# Budget Regression Remediation

regression_remediation:
  detection: automated_ci_gate
  severity_levels:
    warn:
      action: "Create follow-up performance issue; do not block merge"
      sla_hours: 72
    block:
      action: "Block merge; must fix or get explicit waiver before re-submitting PR"
      sla_hours: 24
  escalation:
    unresolved_warn_after_sla: "Escalate to block severity"
    unresolved_block_after_24h: "Page on-call engineer"
  waiver_process:
    required_approval: tech-lead
    max_duration_days: 14
    must_track_in_issue: true
