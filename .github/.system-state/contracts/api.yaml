openapi: 3.0.3
info:
  title: NeuroLogix Contracts API Stub
  version: 1.0.0
  description: Bounded OpenAPI and event schema stub referenced by contracts_model.yaml for Issue #19.
servers:
  - url: https://api.neurologix.local

paths:
  /api/v1/capabilities:
    get:
      operationId: listCapabilities
      summary: List capability definitions.
      responses:
        "200":
          description: Capability list returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilityListResponse"

  /api/v1/policies/evaluate:
    post:
      operationId: evaluatePolicy
      summary: Evaluate policy decision.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyEvaluationRequest"
      responses:
        "200":
          description: Policy decision returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyEvaluationResponse"

  /api/v1/recipes/execute:
    post:
      operationId: executeRecipe
      summary: Trigger recipe execution.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeExecutionRequest"
      responses:
        "202":
          description: Recipe execution accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeExecutionAccepted"

  /api/v1/digital-twin/sync:
    post:
      operationId: syncDigitalTwin
      summary: Synchronize digital twin state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DigitalTwinSyncRequest"
      responses:
        "202":
          description: Twin sync accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DigitalTwinSyncAccepted"

components:
  schemas:
    CapabilityRegistryService:
      type: object
      required: [service, version]
      properties:
        service:
          type: string
          const: capability-registry
        version:
          type: string

    PolicyEngineService:
      type: object
      required: [service, version]
      properties:
        service:
          type: string
          const: policy-engine
        version:
          type: string

    RecipeExecutorService:
      type: object
      required: [service, version]
      properties:
        service:
          type: string
          const: recipe-executor
        version:
          type: string

    DigitalTwinService:
      type: object
      required: [service, version]
      properties:
        service:
          type: string
          const: digital-twin
        version:
          type: string

    CapabilityListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [capabilityId, name]
            properties:
              capabilityId:
                type: string
              name:
                type: string

    PolicyEvaluationRequest:
      type: object
      required: [policyId, context]
      properties:
        policyId:
          type: string
        context:
          type: object
          additionalProperties: true

    PolicyEvaluationResponse:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [allow, deny]
        reasons:
          type: array
          items:
            type: string

    RecipeExecutionRequest:
      type: object
      required: [recipeId]
      properties:
        recipeId:
          type: string
        parameters:
          type: object
          additionalProperties: true

    RecipeExecutionAccepted:
      type: object
      required: [executionId, status]
      properties:
        executionId:
          type: string
        status:
          type: string
          const: accepted

    DigitalTwinSyncRequest:
      type: object
      required: [twinId, state]
      properties:
        twinId:
          type: string
        state:
          type: object
          additionalProperties: true

    DigitalTwinSyncAccepted:
      type: object
      required: [syncId, status]
      properties:
        syncId:
          type: string
        status:
          type: string
          const: accepted

    CapabilityIndexedEvent:
      type: object
      required: [eventId, capabilityId, occurredAt]
      properties:
        eventId:
          type: string
        capabilityId:
          type: string
        occurredAt:
          type: string
          format: date-time

    PolicyEvaluatedEvent:
      type: object
      required: [eventId, policyId, decision, occurredAt]
      properties:
        eventId:
          type: string
        policyId:
          type: string
        decision:
          type: string
        occurredAt:
          type: string
          format: date-time

    RecipeExecutionStatusEvent:
      type: object
      required: [eventId, executionId, status, occurredAt]
      properties:
        eventId:
          type: string
        executionId:
          type: string
        status:
          type: string
        occurredAt:
          type: string
          format: date-time

    DigitalTwinStateUpdatedEvent:
      type: object
      required: [eventId, twinId, occurredAt]
      properties:
        eventId:
          type: string
        twinId:
          type: string
        occurredAt:
          type: string
          format: date-time

x-event-channels:
  capability.indexed:
    schema:
      $ref: "#/components/schemas/CapabilityIndexedEvent"
  policy.evaluated:
    schema:
      $ref: "#/components/schemas/PolicyEvaluatedEvent"
  recipe.execution.status:
    schema:
      $ref: "#/components/schemas/RecipeExecutionStatusEvent"
  twin.state.updated:
    schema:
      $ref: "#/components/schemas/DigitalTwinStateUpdatedEvent"
