        type: api
        protocol: http
        planned_version: 0.1.0
        lifecycle_state: planned
      - contract_id: edge.adapter-telemetry.v1
        type: event
        channel: edge.adapter.telemetry
        planned_version: 0.1.0
        lifecycle_state: planned
