contracts_model:
  id: neurologix-contracts-model
  version: 1.0.0
  phase: 3
  status: proposed
  last_updated: 2026-03-10
  source_issue: 19
  objective: Model-first API and event contract inventory for current and planned platform services.
  companion_artifacts:
    - id: primary-openapi-stub
      type: openapi
      path: .github/.system-state/contracts/api.yaml
      purpose: Bounded OpenAPI/event-channel stub referenced by contract IDs in this model.

versioning_policy:
  semantic_versioning: true
  major_change_rule: breaking_contract_change_requires_major_increment
  minor_change_rule: backward_compatible_additive_changes_require_minor_increment
  patch_change_rule: non_contractual_fixes_require_patch_increment
  deprecation:
    required_fields:
      - replacement_contract_id
      - deprecation_date
      - removal_target_version
      - migration_guidance
  backward_compatibility:
    baseline: n_minus_1_minor_supported
    forbidden_without_major:
      - remove_required_request_field
      - remove_response_field
      - change_field_type_incompatibly
      - incompatible_event_schema_change

contract_testing_obligations:
  quality_gates:
    g1_contract_lint:
      obligation: lint_openapi_and_event_schemas
      required_for_pr: true
    g2_schema_compatibility:
      obligation: validate_backward_compatibility_against_latest_released_contracts
      required_for_pr: true
    g3_consumer_provider_tests:
      obligation: execute_consumer_provider_contract_tests_for_changed_contract_ids
      required_for_pr: true
    g4_ci_required_checks:
      obligation: all_required_checks_green_before_validator_handoff
      required_for_pr: true

current_services:
  capability-registry:
    ownership:
      package_path: services/capability-registry
      service_type: internal-api
    api_contracts:
      - contract_id: capability-registry.v1
        protocol: http
        spec_ref: "#/components/schemas/CapabilityRegistryService"
        openapi_ref: .github/.system-state/contracts/api.yaml#/paths/~1api~1v1~1capabilities
        version: 1.0.0
    event_contracts:
      - contract_id: capability-registry.capability-indexed.v1
        channel: capability.indexed
        schema_ref: .github/.system-state/contracts/api.yaml#/components/schemas/CapabilityIndexedEvent
        version: 1.0.0

  policy-engine:
    ownership:
      package_path: services/policy-engine
      service_type: internal-api
    api_contracts:
      - contract_id: policy-engine.v1
        protocol: http
        spec_ref: "#/components/schemas/PolicyEngineService"
        openapi_ref: .github/.system-state/contracts/api.yaml#/paths/~1api~1v1~1policies~1evaluate
        version: 1.0.0
    event_contracts:
      - contract_id: policy-engine.policy-evaluated.v1
        channel: policy.evaluated
        schema_ref: .github/.system-state/contracts/api.yaml#/components/schemas/PolicyEvaluatedEvent
        version: 1.0.0

  recipe-executor:
    ownership:
      package_path: services/recipe-executor
      service_type: orchestration-api
    api_contracts:
      - contract_id: recipe-executor.v1
        protocol: http
        spec_ref: "#/components/schemas/RecipeExecutorService"
        openapi_ref: .github/.system-state/contracts/api.yaml#/paths/~1api~1v1~1recipes~1execute
        version: 1.0.0
    event_contracts:
      - contract_id: recipe-executor.execution-status.v1
        channel: recipe.execution.status
        schema_ref: .github/.system-state/contracts/api.yaml#/components/schemas/RecipeExecutionStatusEvent
        version: 1.0.0

  digital-twin:
    ownership:
      package_path: services/digital-twin
      service_type: simulation-api
    api_contracts:
      - contract_id: digital-twin.v1
        protocol: http
        spec_ref: "#/components/schemas/DigitalTwinService"
        openapi_ref: .github/.system-state/contracts/api.yaml#/paths/~1api~1v1~1digital-twin~1sync
        version: 1.0.0
    event_contracts:
      - contract_id: digital-twin.state-updated.v1
        channel: twin.state.updated
        schema_ref: .github/.system-state/contracts/api.yaml#/components/schemas/DigitalTwinStateUpdatedEvent
        version: 1.0.0

planned_contracts:
  dispatch:
    description: Dispatch planning and execution contract boundary.
    target_contracts:
      - contract_id: dispatch.v1
        type: api
        protocol: http
        planned_version: 0.1.0
        lifecycle_state: planned
      - contract_id: dispatch.job-dispatched.v1
