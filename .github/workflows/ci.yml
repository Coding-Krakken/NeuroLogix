name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────
  # Model State Validation (model-first gate)
  # ─────────────────────────
  model-state:
    name: Model State
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate system-state model
        run: npm run validate:model:system-state

      - name: Validate documentation packets
        run: npm run validate:doc-packets

      - name: Validate customer packet completeness
        run: npm run validate:customer-packet

      - name: Validate broker runtime wiring
        run: npm run validate:broker-runtime

      - name: Validate agent governance
        run: npm run validate:agent-governance

  # ─────────────────────────
  # Lint
  # ─────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [model-state]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  # ─────────────────────────
  # Type Check
  # ─────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [model-state]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check

  # ─────────────────────────
  # Unit Tests
  # ─────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [model-state]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci
        env:
          CI: true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: '**/coverage/'
          retention-days: 7

  # ─────────────────────────
  # Server Contract Tests
  # ─────────────────────────
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [model-state]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run server contract tests
        run: npm run test:contracts:servers

      - name: Run consumer contract tests
        run: npm run test:contracts:consumers

  # ─────────────────────────
  # OPA Policy Tests
  # ─────────────────────────
  opa-policy-tests:
    name: OPA Policy Tests
    runs-on: ubuntu-latest
    needs: [model-state]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Validate OPA policy bundle
        run: npm run test:opa

  # ─────────────────────────
  # Lighthouse CI (Mission Control UX SLO gate)
  # ─────────────────────────
  lighthouse-ci:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [model-state]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace artifacts
        run: npm run build

      - name: Start mission-control server
        run: |
          node -e "import('./apps/mission-control/dist/index.js')" > mission-control.log 2>&1 &
          echo $! > mission-control.pid

          for i in {1..60}; do
            if curl -fsS http://localhost:3100/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Mission Control did not become healthy in time."
          cat mission-control.log || true
          exit 1
        env:
          PORT: '3100'
          HOST: '127.0.0.1'
          NODE_ENV: test

      - name: Run Lighthouse CI gate
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3100/
          budgetPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop mission-control server
        if: always()
        run: |
          if [ -f mission-control.pid ]; then
            kill "$(cat mission-control.pid)" || true
          fi

  # ─────────────────────────
  # Playwright E2E (Mission Control critical operator journey)
  # ─────────────────────────
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [model-state]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace artifacts
        run: npm run build

      - name: Run deterministic Playwright E2E baseline
        run: npm run test:e2e
        env:
          CI: true

      - name: Export E2E triage summary
        if: always()
        run: node scripts/export-playwright-triage.js

      - name: Upload E2E evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/e2e-results.json
            test-results/e2e-triage-summary.json
            test-results/e2e-triage-summary.md
          retention-days: 14
          if-no-files-found: warn

  # ─────────────────────────
  # Performance Benchmarks (Phase 8 PERF-BUDGETS gate)
  # ─────────────────────────
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: [model-state]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspace artifacts
        run: npm run build

      - name: Start mission-control server
        run: |
          node -e "import('./apps/mission-control/dist/index.js')" > mission-control.log 2>&1 &
          echo $! > mission-control.pid

          for i in {1..60}; do
            if curl -fsS http://localhost:3100/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "Mission Control did not become healthy in time."
          cat mission-control.log || true
          exit 1
        env:
          PORT: '3100'
          HOST: '127.0.0.1'
          NODE_ENV: test

      - name: Run performance benchmark gate
        run: npm run bench --workspace @neurologix/benchmarks
        env:
          BASE_URL: http://localhost:3100

      - name: Upload benchmark evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: benchmark-results/
          retention-days: 14
          if-no-files-found: warn

      - name: Stop mission-control server
        if: always()
        run: |
          if [ -f mission-control.pid ]; then
            kill "$(cat mission-control.pid)" || true
          fi

  # ─────────────────────────
  # Build
  # ─────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [model-state, lint, typecheck, test, contract-tests, opa-policy-tests, lighthouse-ci, e2e, benchmark]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  # ─────────────────────────
  # Secrets Scan
  # ─────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─────────────────────────
  # Dependency Audit
  # ─────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: [model-state]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: false
