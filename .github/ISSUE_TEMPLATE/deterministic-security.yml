name: Deterministic Security
description: Security vulnerability or hardening request
title: 'security(<component>): <summary>'
labels: ['security', 'triage']
body:
  - type: dropdown
    id: work_item_type
    attributes:
      label: Work Item Type
      options: ['security-vulnerability', 'security-hardening']
    validations:
      required: true
  - type: input
    id: cvss
    attributes:
      label: CVSS (if vulnerability)
      placeholder: 'e.g., 9.1'
  - type: dropdown
    id: disclosure
    attributes:
      label: Disclosure Status
      options: ['not-started', 'coordinated-disclosure', 'public', 'n/a']
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options: ['S0', 'S1', 'S2', 'S3', 'S4']
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ['P0', 'P1', 'P2', 'P3']
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk Category
      options: ['low', 'medium', 'high', 'critical']
    validations:
      required: true
  - type: dropdown
    id: component_area
    attributes:
      label: Component Area
      options: ['security', 'backend', 'frontend', 'data', 'infra', 'platform']
    validations:
      required: true
  - type: dropdown
    id: deployment_surface
    attributes:
      label: Deployment Surface
      options: ['non-prod', 'prod']
    validations:
      required: true
  - type: dropdown
    id: data_sensitivity
    attributes:
      label: Data Sensitivity
      options: ['public', 'internal', 'confidential', 'regulated']
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Affected Versions / Surfaces
    validations:
      required: true
  - type: textarea
    id: mitigation
    attributes:
      label: Mitigation and Verification Plan
    validations:
      required: true
