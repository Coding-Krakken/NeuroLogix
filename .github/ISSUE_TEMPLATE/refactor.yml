name: Refactor
description: Improve structure/maintainability without changing external behavior.
title: "[Refactor]: "
labels:
  - type:refactor
body:
  - type: input
    id: proposed_title
    attributes:
      label: Title
      description: Exact refactor title. Align issue title with this value.
      placeholder: Extract domain validation service for order rules
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: Current maintainability or complexity problem.
    validations:
      required: true
  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired Outcome
      description: Structural outcome while preserving behavior.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Include behavior-preservation checks.
    validations:
      required: true
  - type: dropdown
    id: business_value
    attributes:
      label: Business Value
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: dropdown
    id: severity_or_priority
    attributes:
      label: Severity or Priority
      options:
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Scope
      placeholder: Extract validation module and update tests
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-Goals
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
  - type: textarea
    id: screenshots_or_logs
    attributes:
      label: Screenshots or Logs
  - type: textarea
    id: risk_notes
    attributes:
      label: Risk Notes
