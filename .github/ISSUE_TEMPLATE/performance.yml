name: Performance
description: Improve performance with measurable targets and validation.
title: "[Performance]: "
labels:
  - type:performance
body:
  - type: input
    id: proposed_title
    attributes:
      label: Title
      description: Exact performance work item title.
      placeholder: Reduce p95 API latency for batch sync endpoint
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: Current bottleneck and impact.
    validations:
      required: true
  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired Outcome
      description: Target metric and expected impact.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Include explicit before/after metric criteria.
    validations:
      required: true
  - type: dropdown
    id: business_value
    attributes:
      label: Business Value
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: dropdown
    id: severity_or_priority
    attributes:
      label: Severity or Priority
      options:
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Scope
      placeholder: Optimize query + cache key path + tests
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-Goals
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
  - type: textarea
    id: screenshots_or_logs
    attributes:
      label: Screenshots or Logs
      description: Benchmarks, traces, profiling snapshots.
  - type: textarea
    id: risk_notes
    attributes:
      label: Risk Notes
