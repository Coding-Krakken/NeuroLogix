name: Deterministic Refactor
description: Refactor/tech debt item with invariant protection
title: 'refactor(<component>): <summary>'
labels: ['refactor', 'tech-debt', 'triage']
body:
  - type: dropdown
    id: work_item_type
    attributes:
      label: Work Item Type
      options: ['refactor', 'tech-debt']
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ['P1', 'P2', 'P3']
    validations:
      required: true
  - type: dropdown
    id: component_area
    attributes:
      label: Component Area
      options: ['frontend', 'backend', 'data', 'infra', 'platform', 'docs']
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and Invariants
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Regression Validation Plan
    validations:
      required: true
