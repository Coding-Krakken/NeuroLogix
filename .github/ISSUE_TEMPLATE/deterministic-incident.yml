name: Deterministic Incident
description: Production incident or outage
title: 'incident(<service>): <summary>'
labels: ['incident', 'triage']
body:
  - type: dropdown
    id: work_item_type
    attributes:
      label: Work Item Type
      options: ['incident', 'hotfix']
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options: ['S0', 'S1', 'S2', 'S3', 'S4']
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ['P0', 'P1', 'P2', 'P3']
    validations:
      required: true
  - type: input
    id: incident_commander
    attributes:
      label: Incident Commander
      placeholder: 'agent-id'
    validations:
      required: true
  - type: textarea
    id: timeline
    attributes:
      label: Timeline and Current Status
    validations:
      required: true
  - type: textarea
    id: customer_impact
    attributes:
      label: Customer Impact
    validations:
      required: true
  - type: textarea
    id: mitigation
    attributes:
      label: Mitigation and Rollback Plan
    validations:
      required: true
