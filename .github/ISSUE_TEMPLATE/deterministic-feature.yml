name: Deterministic Feature
description: Feature or enhancement request with deterministic governance metadata
title: 'feature(<component>): <summary>'
labels: ['feature', 'triage']
body:
  - type: dropdown
    id: work_item_type
    attributes:
      label: Work Item Type
      options: ['feature', 'enhancement']
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options: ['S0', 'S1', 'S2', 'S3', 'S4']
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: ['P0', 'P1', 'P2', 'P3']
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk Category
      options: ['low', 'medium', 'high', 'critical']
    validations:
      required: true
  - type: dropdown
    id: blast_radius
    attributes:
      label: Blast Radius
      options: ['single-team', 'multi-team', 'customer-visible', 'global']
    validations:
      required: true
  - type: dropdown
    id: component_area
    attributes:
      label: Component Area
      options: ['frontend', 'backend', 'data', 'infra', 'security', 'platform', 'docs']
    validations:
      required: true
  - type: dropdown
    id: deployment_surface
    attributes:
      label: Deployment Surface
      options: ['non-prod', 'prod']
    validations:
      required: true
  - type: dropdown
    id: rollout_method
    attributes:
      label: Rollout Method
      options: ['all-at-once', 'flag', 'ring', 'canary']
    validations:
      required: true
  - type: dropdown
    id: data_sensitivity
    attributes:
      label: Data Sensitivity
      options: ['public', 'internal', 'confidential', 'regulated']
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: '- [ ] Criterion 1'
    validations:
      required: true
  - type: textarea
    id: test_plan
    attributes:
      label: Test Plan
    validations:
      required: true
  - type: textarea
    id: rollout
    attributes:
      label: Rollout / Rollback Plan
    validations:
      required: true
  - type: dropdown
    id: orchestrator_owner
    attributes:
      label: Orchestrator Ownership
      options: ['00-chief-of-staff']
    validations:
      required: true
  - type: dropdown
    id: implementer_owner
    attributes:
      label: Implementer Ownership
      options: ['tech-lead']
    validations:
      required: true
  - type: dropdown
    id: assurance_owner
    attributes:
      label: Assurance Ownership
      options: ['quality-director']
    validations:
      required: true
  - type: textarea
    id: specialist_escalation
    attributes:
      label: Specialist Escalation Triggers (if known)
      placeholder: 'security/compliance/incident/data-migration/legal/regulatory'
    validations:
      required: false
