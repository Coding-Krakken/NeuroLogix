name: Compliance
description: Track policy, legal, audit, and control implementation changes.
title: "[Compliance]: "
labels:
  - type:compliance
body:
  - type: input
    id: proposed_title
    attributes:
      label: Title
      description: Exact compliance work item title.
      placeholder: Enforce data retention policy checks in archival workflow
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
    validations:
      required: true
  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired Outcome
      description: Expected compliant state.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Include objective evidence requirements.
    validations:
      required: true
  - type: dropdown
    id: business_value
    attributes:
      label: Business Value
      options:
        - Critical
        - High
        - Medium
    validations:
      required: true
  - type: dropdown
    id: severity_or_priority
    attributes:
      label: Severity or Priority
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Scope
      placeholder: Policy-aligned rule implementation with test evidence
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-Goals
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Regulatory or contractual boundaries.
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
  - type: textarea
    id: screenshots_or_logs
    attributes:
      label: Screenshots or Logs
  - type: textarea
    id: risk_notes
    attributes:
      label: Risk Notes