name: Feature
description: Request a new capability delivered as a small, safe, testable slice.
title: "[Feature]: "
labels:
  - type:feature
body:
  - type: markdown
    attributes:
      value: |
        Use a precise issue title and keep scope narrow.
  - type: input
    id: proposed_title
    attributes:
      label: Title
      description: Exact work item title. Align issue title with this value.
      placeholder: Add role-based bulk export capability
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: What problem exists today and who is impacted?
    validations:
      required: true
  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired Outcome
      description: What observable outcome should be true after delivery?
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Use testable statements. One per line.
      placeholder: |
        - [ ] Given X, when Y, then Z
        - [ ] ...
    validations:
      required: true
  - type: dropdown
    id: business_value
    attributes:
      label: Business Value
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: dropdown
    id: severity_or_priority
    attributes:
      label: Severity or Priority
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Scope
      description: Smallest complete slice expected.
      placeholder: Add API endpoint + service + tests for template cloning
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-Goals
      description: Explicitly out-of-scope items.
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Performance, compatibility, compliance, rollout, etc.
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Blocking issues, external prerequisites, migrations.
  - type: textarea
    id: screenshots_or_logs
    attributes:
      label: Screenshots or Logs
      description: Optional context links or snippets.
  - type: textarea
    id: risk_notes
    attributes:
      label: Risk Notes
      description: Known risks, rollback considerations, unknowns.
