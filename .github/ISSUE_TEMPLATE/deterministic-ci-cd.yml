name: Deterministic CI/CD
description: CI/CD and build system change with rollback control
title: "ci-cd(<pipeline>): <summary>"
labels: ["ci-cd", "triage"]
body:
  - type: dropdown
    id: work_item_type
    attributes:
      label: Work Item Type
      options: ["ci-cd", "infrastructure", "release"]
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk Category
      options: ["low", "medium", "high", "critical"]
    validations:
      required: true
  - type: dropdown
    id: deployment_surface
    attributes:
      label: Deployment Surface
      options: ["non-prod", "prod"]
    validations:
      required: true
  - type: textarea
    id: change_summary
    attributes:
      label: Pipeline/System Change Summary
    validations:
      required: true
  - type: textarea
    id: quality
    attributes:
      label: Quality Gate Impact and Equivalence Proof
    validations:
      required: true
  - type: textarea
    id: rollback
    attributes:
      label: Rollback Plan
    validations:
      required: true
