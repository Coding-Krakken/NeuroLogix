name: Security
description: Track a security improvement or vulnerability remediation.
title: "[Security]: "
labels:
  - type:security
body:
  - type: input
    id: proposed_title
    attributes:
      label: Title
      description: Exact security work item title.
      placeholder: Harden session cookie defaults across auth paths
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: Security weakness, attack path, or compliance risk.
    validations:
      required: true
  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired Outcome
      description: Security posture after remediation.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Include verifiable security checks.
    validations:
      required: true
  - type: dropdown
    id: business_value
    attributes:
      label: Business Value
      options:
        - Critical
        - High
        - Medium
    validations:
      required: true
  - type: dropdown
    id: severity_or_priority
    attributes:
      label: Severity or Priority
      options:
        - P0
        - P1
        - P2
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Scope
      placeholder: Apply secure defaults and add integration coverage
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-Goals
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Compliance, legal, data handling, key management constraints.
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
  - type: textarea
    id: screenshots_or_logs
    attributes:
      label: Screenshots or Logs
  - type: textarea
    id: risk_notes
    attributes:
      label: Risk Notes
      description: Include exploitability and rollback notes.
