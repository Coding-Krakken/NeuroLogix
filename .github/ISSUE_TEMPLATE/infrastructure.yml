name: Infrastructure
description: Track infrastructure, build, deploy, or environment reliability changes.
title: "[Infrastructure]: "
labels:
  - type:infrastructure
body:
  - type: input
    id: proposed_title
    attributes:
      label: Title
      description: Exact infrastructure work item title.
      placeholder: Stabilize CI cache strategy for deterministic builds
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
    validations:
      required: true
  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired Outcome
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
    validations:
      required: true
  - type: dropdown
    id: business_value
    attributes:
      label: Business Value
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: dropdown
    id: severity_or_priority
    attributes:
      label: Severity or Priority
      options:
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Scope
      placeholder: Build pipeline hardening and validation updates
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-Goals
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
  - type: textarea
    id: screenshots_or_logs
    attributes:
      label: Screenshots or Logs
  - type: textarea
    id: risk_notes
    attributes:
      label: Risk Notes
