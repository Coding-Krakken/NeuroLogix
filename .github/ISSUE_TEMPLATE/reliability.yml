name: Reliability
description: Improve stability, failure handling, and recovery behavior.
title: "[Reliability]: "
labels:
  - type:reliability
body:
  - type: input
    id: proposed_title
    attributes:
      label: Title
      description: Exact reliability work item title.
      placeholder: Add idempotency guard for duplicate webhook processing
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
    validations:
      required: true
  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired Outcome
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Include failure-mode and recovery criteria.
    validations:
      required: true
  - type: dropdown
    id: business_value
    attributes:
      label: Business Value
      options:
        - Critical
        - High
        - Medium
    validations:
      required: true
  - type: dropdown
    id: severity_or_priority
    attributes:
      label: Severity or Priority
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: input
    id: scope
    attributes:
      label: Scope
      placeholder: Add retry circuit + idempotency checks + tests
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-Goals
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
  - type: textarea
    id: screenshots_or_logs
    attributes:
      label: Screenshots or Logs
      description: Failure logs, incident excerpts, monitoring signals.
  - type: textarea
    id: risk_notes
    attributes:
      label: Risk Notes
