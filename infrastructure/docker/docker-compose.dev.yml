version: '3.8'

name: neurologix-dev

services:
  # Message Brokers
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: neurologix-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - neurologix-network

  redpanda:
    image: redpandadata/redpanda:v23.2.20
    container_name: neurologix-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=info
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
      - "19644:9644"
    volumes:
      - redpanda:/var/lib/redpanda/data
    networks:
      - neurologix-network
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'healthy|Healthy'"]
      interval: 15s
      timeout: 3s
      retries: 5

  # Databases
  postgres:
    image: postgres:15-alpine
    container_name: neurologix-postgres
    environment:
      POSTGRES_DB: neurologix
      POSTGRES_USER: neurologix
      POSTGRES_PASSWORD: dev-password-change-in-production
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - neurologix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurologix"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: neurologix-redis
    command: redis-server --appendonly yes --requirepass dev-password-change-in-production
    ports:
      - "6379:6379"
    volumes:
      - redis:/data
    networks:
      - neurologix-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Observability Stack
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: neurologix-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/config:/etc/prometheus:ro
      - prometheus:/prometheus
    networks:
      - neurologix-network
    depends_on:
      - alertmanager

  grafana:
    image: grafana/grafana-oss:10.1.0
    container_name: neurologix-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: dev-password-change-in-production
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - neurologix-network
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: neurologix-alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager:ro
      - alertmanager:/alertmanager
    networks:
      - neurologix-network

  jaeger:
    image: jaegertracing/all-in-one:1.49
    container_name: neurologix-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - neurologix-network

  # Security & Policy
  opa:
    image: openpolicyagent/opa:0.57.0-envoy
    container_name: neurologix-opa
    command:
      - "run"
      - "--server"
      - "--config-file=/config/config.yaml"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - ./opa/policies:/policies:ro
      - ./opa/config:/config:ro
    networks:
      - neurologix-network

  # Development Tools
  pgadmin:
    image: dpage/pgadmin4:7.6
    container_name: neurologix-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@neurologix.local
      PGADMIN_DEFAULT_PASSWORD: dev-password-change-in-production
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin:/var/lib/pgadmin
    networks:
      - neurologix-network
    depends_on:
      - postgres

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: neurologix-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - neurologix-network

volumes:
  postgres:
    driver: local
  redis:
    driver: local
  redpanda:
    driver: local
  prometheus:
    driver: local
  grafana:
    driver: local
  alertmanager:
    driver: local
  pgadmin:
    driver: local

networks:
  neurologix-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16