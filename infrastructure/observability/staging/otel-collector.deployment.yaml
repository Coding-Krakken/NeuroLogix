apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: neurologix-observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: neurologix
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: neurologix
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.95.0
          args:
            - --config=/conf/otel-collector-config.yaml
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 8888
              name: otel-metrics
            - containerPort: 13133
              name: healthz
          env:
            - name: DEPLOY_ENV
              value: staging
            - name: CLOUD_REGION
              value: local
            - name: JAEGER_ENDPOINT
              value: jaeger-collector.neurologix-observability.svc.cluster.local:4317
            - name: PROMETHEUS_REMOTE_WRITE_ENDPOINT
              value: http://prometheus-server.neurologix-observability.svc.cluster.local:9090/api/v1/write
            - name: ELASTICSEARCH_ENDPOINT
              value: http://elasticsearch.neurologix-observability.svc.cluster.local:9200
            - name: ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: observability-elk-credentials
                  key: username
                  optional: true
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: observability-elk-credentials
                  key: password
                  optional: true
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: otel-config
              mountPath: /conf
              readOnly: true
      volumes:
        - name: otel-config
          configMap:
            name: neurologix-otel-collector-config
            items:
              - key: otel-collector-config.yaml
                path: otel-collector-config.yaml