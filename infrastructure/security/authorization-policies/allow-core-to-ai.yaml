# AuthorizationPolicy: allow-core-to-ai
#
# Permits mTLS-authenticated workloads in the Core zone (neurologix-core) to
# submit inference requests to AI zone (neurologix-ai) services.
#
# Allowed flows (ADR-011 trust zone table):
#   - Core recipe-executor → AI inference service: POST inference requests
#   - Core → AI: GET health checks for readiness gating
#
# Methods: POST (inference submission), GET (health/readiness)
#
# The Core recipe-executor is the only permitted caller of the AI inference
# path. AI services must validate that all incoming inference requests carry
# the Core service identity. Direct Edge or UI calls to AI are forbidden.
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-core-to-ai
  namespace: neurologix-ai
  labels:
    app.kubernetes.io/part-of: neurologix
    security.neurologix.io/zone: ai
    security.neurologix.io/source-zone: core
    security.neurologix.io/policy-type: zone-allowlist
  annotations:
    security.neurologix.io/iec62443-sr: "SR 2.1, SR 5.2"
    security.neurologix.io/adr: "ADR-011"
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/neurologix-core/sa/*"
      to:
        - operation:
            methods:
              - "POST"
              - "GET"
            paths:
              - "/api/inference/*"
              - "/api/models/*"
              - "/health*"
              - "/healthz"
              - "/readyz"
