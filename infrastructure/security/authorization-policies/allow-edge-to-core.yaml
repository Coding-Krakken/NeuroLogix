# AuthorizationPolicy: allow-edge-to-core
#
# Permits mTLS-authenticated workloads in the Edge zone (neurologix-edge) to
# call the Core zone (neurologix-core) API surface.
#
# Allowed flows (ADR-011 trust zone table):
#   - Edge adapter → Core API: sensor event publishing, adapter registration
#   - Edge adapter → Core API: heartbeat / health status
#
# Methods: GET (health/status polling), POST (sensor events, registration)
# Hard constraint: Edge MUST NOT call AI zone directly; all inference routing
# must go through Core.
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-edge-to-core
  namespace: neurologix-core
  labels:
    app.kubernetes.io/part-of: neurologix
    security.neurologix.io/zone: core
    security.neurologix.io/source-zone: edge
    security.neurologix.io/policy-type: zone-allowlist
  annotations:
    security.neurologix.io/iec62443-sr: "SR 5.2"
    security.neurologix.io/adr: "ADR-011"
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/neurologix-edge/sa/*"
      to:
        - operation:
            methods:
              - "GET"
              - "POST"
            paths:
              - "/api/adapters/*"
              - "/api/tags/*"
              - "/api/health*"
              - "/healthz"
              - "/readyz"
